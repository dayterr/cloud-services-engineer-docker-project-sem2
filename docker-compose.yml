services:
  backend:
    image: ${DOCKER_USERNAME}/docker-project-backend:latest
    restart: unless-stopped
    networks:
      - my-net
    expose: ["8081"]
    environment:
      - JWT_TOKEN=${JWT_TOKEN}
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 3
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64M

  frontend:
    image: ${DOCKER_USERNAME}/docker-project-frontend:latest
    restart: unless-stopped
    networks:
      - my-net
    depends_on:
      backend:
        condition: service_healthy
    ports: 
      - "80:80"
    environment:
      - VUE_APP_API_URL=/api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=128M
      - /var/run:rw,noexec,nosuid,size=64M

networks:
  my-net:
    driver: bridge
    name: my-net

volumes:
  backend-data: